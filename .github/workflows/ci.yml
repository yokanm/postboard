# ─── Postboard — CI Pipeline ─────────────────────────────────────────────────
# Runs on every push to main and every PR.
# Stages: lint → type-check → unit tests → build → docker → security audit

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Design/**'
      - 'nginx/**'
      - 'backups/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Design/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20

jobs:
  # ─── Frontend: Lint + Type Check + Test + Build ────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate routes
        run: npx tsr generate

      - name: Biome lint
        run: npm run lint

      - name: Biome check
        run: npm run check

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # ─── Backend: Lint + Type Check + Test + Build ─────────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./jobboard

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobboard_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: jobboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobboard_test

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobboard_test
          JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-long!!!!!
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-long!!!!
          JWT_SUPERADMIN_SECRET: ci-superadmin-secret-32-chars!!!!
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          LOG_LEVEL: silent

      - name: Build
        run: npm run build

  # ─── Docker Build Test ─────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: false
          tags: postboard/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./jobboard
          file: ./jobboard/Dockerfile
          target: production
          push: false
          tags: postboard/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./jobboard
          file: ./jobboard/Dockerfile.worker
          target: production
          push: false
          tags: postboard/worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Audit ────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [docker]

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (frontend)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: postboard/frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scanner (API)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: postboard/api:ci
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Run Trivy vulnerability scanner (Worker)
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: postboard/worker:ci
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif

      - name: NPM audit (frontend)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: NPM audit (backend)
        run: npm audit --audit-level=high
        working-directory: ./jobboard
        continue-on-error: true
