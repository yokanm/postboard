# ─── Postboard — Deployment Pipeline ────────────────────────────────────────
# Triggered manually or on push to main.
# Pushes Docker images to registry and deploys to production/staging.

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'Design/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: 20
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build & Push Docker Images ────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/frontend
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./jobboard
          file: ./jobboard/Dockerfile
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./jobboard
          file: ./jobboard/Dockerfile.worker
          target: production
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/worker:${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging / Production ────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.DEPLOY_URL || 'https://yourdomain.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: ${{ vars.DEPLOY_KNOWN_HOSTS }}

      - name: Deploy via Docker Compose
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_PATH }} &&

            # Pull latest images
            docker compose pull &&

            # Deploy with zero-downtime
            docker compose up -d --no-deps --remove-orphans &&

            # Wait for health checks
            sleep 15 &&

            # Verify deployment
            curl -sf http://localhost:8080/health || exit 1
            curl -sf http://localhost:5000/health || exit 1

            echo 'Deployment successful!'
          "

  # ─── Rollback (on failure) ─────────────────────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Rollback to previous version
        run: |
          ssh -o StrictHostKeyChecking=no ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "
            cd ${{ vars.DEPLOY_PATH }} &&
            docker compose up -d --no-deps --remove-orphans
            echo 'Rollback complete - reverted to previous images'
          "
