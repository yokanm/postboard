            animation: subtleShimmer 2s infinite ease-in-out;

<body class="bg-background text-on-background min-h-screen flex overflow-hidden relative">
<!-- Ambient Grid Background Lines (Subtle) -->

<!-- Left Split: Wordmark & Log -->

<header class="flex justify-between items-start">
<span class="font-mono-label text-mono-label text-dim uppercase">
                // SYSTEM_RESTORE_SEQUENCE
            </span>
<span class="font-mono-label text-mono-label text-dim" id="loading-timer">
                00:00:00
            </span>
</header>
<div class="flex-grow flex items-center justify-center my-8">
<h1 class="font-masthead-4xl text-masthead-4xl text-on-surface uppercase tracking-tighter vertical-text whitespace-nowrap">
                POSTBOARD
            </h1>
</div>
<div class="font-mono-label text-mono-label text-dim space-y-2 h-48 overflow-hidden" id="handshake-log">
<div class="text-gradient-d">// AUTH_INIT... PENDING</div>
<!-- Populated by JS -->
</div>
<footer class="mt-8 pt-unit border-t border-rule w-full">
<span class="font-mono-label text-mono-label text-dim uppercase block text-center">
                [ KERNEL V2.4.1 ]
            </span>
</footer>
</div>
<!-- Right Split: Grid & Headline -->
<div class="w-2/3 flex flex-col p-margin bg-background">
<div class="flex-grow flex flex-col justify-center max-w-3xl mx-auto w-full">
<h2 class="font-headline-2xl text-headline-2xl text-on-surface mb-8 text-gradient-d tracking-wide">
                AUTHENTICATING
            </h2>
<p class="font-body-base text-body-base text-body mb-section-v-pad max-w-lg">
                Please wait while we securely restore your session. Authenticating credentials and rebuilding application state across nodes.
            </p>
<!-- The Press Grid Skeleton/Loading Treatment -->
<div class="w-full border-t border-l border-rule grid grid-cols-8 md:grid-cols-12 gap-0" id="press-grid">
<!-- Tiles populated by JS -->
</div>
</div>
</div>
</main>
<script>
        // Generate Press Grid Tiles
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('press-grid');
            const totalTiles = 96; // 8 rows of 12 on desktop for denser look

            for (let i = 0; i < totalTiles; i++) {
                const tile = document.createElement('div');
                tile.className = 'press-tile w-full aspect-square border-r border-b border-rule bg-surface-container-lowest';
                
                // Add sporadic active state mimicking data retrieval
                if (Math.random() > 0.8) {
                    tile.style.animationDuration = (1 + Math.random()) + 's';
                    // occasionally highlight a tile
                    if(Math.random() > 0.9) {
                        tile.classList.add('bg-gradient-d');
                        tile.style.opacity = '0.2';
                    }
                }

                gridContainer.appendChild(tile);
            }

            // Simple timer for terminal feel
            let seconds = 0;
            const timerEl = document.getElementById('loading-timer');
            setInterval(() => {
                seconds++;
                const hrs = Math.floor(seconds / 3600).toString().padStart(2, '0');
                const mins = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerEl.textContent = `${hrs}:${mins}:${secs}`;
            }, 1000);

            // Mock Handshake Log
            const logEl = document.getElementById('handshake-log');
            const messages = [
                "// CHECKING_NODE_REGISTRY... OK",
                "// VERIFYING_KEYS... OK",
                "// ESTABLISHING_SECURE_TUNNEL... OK",
                "// FETCHING_STATE_BLOBS... IN_PROGRESS",
                "// DECRYPTING_PAYLOAD... OK",
                "// SYNCING_WORKER_NODES... OK",
                "// VALIDATING_CHECKSUMS... OK",
                "// REBUILDING_VIRTUAL_DOM... IN_PROGRESS"
            ];
            let msgIdx = 0;

            setInterval(() => {
                if(msgIdx < messages.length) {
                    const line = document.createElement('div');
                    line.textContent = messages[msgIdx];
                    logEl.appendChild(line);
                    
                    // Keep log scrolled to bottom
                    if (logEl.children.length > 8) {
                        logEl.removeChild(logEl.firstChild);
                    }
                    
                    msgIdx++;
                } else {
                    // Loop or add generic dots
                    const line = document.createElement('div');
                    line.textContent = "// AWAITING_FINAL_ACK...";
                    logEl.appendChild(line);
                    if (logEl.children.length > 8) {
                        logEl.removeChild(logEl.firstChild);
                    }
                }
            }, 1500);
        });
    </script>
