<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor (Suppressed nav items for transactional screen) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-center items-center px-margin h-16 bg-background border-b border-rule flat no shadows">
<div class="font-masthead-4xl text-headline-2xl-mobile uppercase tracking-tighter text-primary">POSTBOARD</div>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center p-gutter pt-24 pb-24">
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Technical Monospace Prefix -->
<div class="font-mono-label text-mono-label text-dim uppercase mb-8 tracking-widest border border-rule px-3 py-1 bg-surface-container-low rounded-none">
                // SYSTEM_STATUS: VERIFIED
            </div>
<!-- Success Icon (Neon Green) -->
<div class="mb-8 relative flex justify-center items-center w-24 h-24 rounded-full border border-live-dim bg-surface-container flex-shrink-0">
<span class="material-symbols-outlined text-live neon-glow" data-icon="check_circle" style="font-variation-settings: 'FILL' 1; font-size: 48px;">
                    check_circle
                </span>
<!-- Subtle decorative ring -->
<div class="absolute inset-[-8px] rounded-full border border-live/20 pointer-events-none"></div>
</div>
<!-- Headline -->
<h1 class="font-headline-2xl-mobile text-headline-2xl-mobile text-on-surface mb-4">
                Email Verified
            </h1>
<!-- Body Text -->
<p class="font-body-base text-body-base text-body mb-12 max-w-[280px]">
                Your identity has been successfully authenticated. You may now proceed to access the network.
            </p>
<!-- Actions Container -->
<div class="w-full space-y-4 flex flex-col items-center">
<!-- Primary CTA -->
<button class="w-full max-w-[300px] h-[48px] bg-[#E8610A] text-[#080808] font-ui-sm text-ui-sm uppercase tracking-wider rounded-none hover:bg-opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                    Continue to Login
                    <span class="material-symbols-outlined" data-icon="arrow_forward" style="font-size: 18px;">arrow_forward</span>
</button>
<!-- Secondary CTA -->
<button class="w-full max-w-[300px] h-[48px] bg-transparent text-[#F0EDE6] border border-rule font-ui-sm text-ui-sm uppercase tracking-wider rounded-none hover:bg-surface-container hover:border-dim active:scale-[0.98] transition-all flex justify-center items-center gap-2">
