<body class="bg-background text-on-background h-screen w-screen flex flex-col justify-center items-center overflow-hidden relative">
<!-- Decorative Grid/Grain Background overlay -->
<div class="absolute inset-0 bg-grain pointer-events-none z-0"></div>
<div class="absolute inset-0 pointer-events-none z-0" style="background-image: linear-gradient(to right, #1A1A1A 1px, transparent 1px), linear-gradient(to bottom, #1A1A1A 1px, transparent 1px); background-size: 32px 32px; opacity: 0.2;"></div>
<main class="z-10 flex flex-col items-center justify-center w-full px-margin max-w-sm">
<!-- Branding -->
<div class="mb-12 flex flex-col items-center text-center">
<h1 class="font-masthead-4xl text-headline-2xl-mobile uppercase tracking-tighter text-primary">POSTBOARD</h1>
<div class="h-px w-16 bg-primary mt-4"></div>
</div>
<!-- System Status Label -->
<div class="mb-8">
<span class="font-mono-label text-mono-label uppercase text-dim tracking-widest">// RESTORING_SESSION</span>
</div>
<!-- Skeleton Loaders (Simulating fetching data) -->
<div class="w-full flex flex-col gap-4">
<!-- Skeleton 1: Avatar/Header simulation -->
<div class="flex items-center gap-4 border border-rule p-4 bg-surface-container-low rounded-none">
<div class="w-12 h-12 bg-surface-variant animate-pulse-fast rounded-none"></div>
<div class="flex flex-col gap-2 flex-1">
<div class="h-3 bg-surface-variant w-3/4 animate-pulse-fast rounded-none"></div>
<div class="h-3 bg-surface-variant w-1/2 animate-pulse-fast rounded-none delay-75"></div>
</div>
</div>
<!-- Skeleton 2: Content simulation -->
<div class="border border-rule p-4 bg-surface-container-low rounded-none">
<div class="flex flex-col gap-3">
<div class="h-3 bg-surface-variant w-full animate-pulse-fast rounded-none delay-100"></div>
<div class="h-3 bg-surface-variant w-full animate-pulse-fast rounded-none delay-150"></div>
<div class="h-3 bg-surface-variant w-5/6 animate-pulse-fast rounded-none delay-200"></div>
</div>
</div>
<!-- Skeleton 3: Action simulation -->
<div class="border border-rule p-4 bg-surface-container-low rounded-none flex justify-between items-center">
<div class="h-3 bg-surface-variant w-1/3 animate-pulse-fast rounded-none delay-300"></div>
<div class="w-16 h-8 bg-surface-variant animate-pulse-fast rounded-none delay-300"></div>
</div>
</div>
<!-- Progress Indicator -->
<div class="mt-12 w-full max-w-[200px] flex flex-col items-center gap-2">
<div class="w-full h-1 bg-surface-variant rounded-none overflow-hidden relative">
<div class="absolute top-0 left-0 h-full bg-primary animate-[slide_2s_ease-in-out_infinite] w-1/3 rounded-none"></div>
</div>
<p class="font-mono-label text-mono-label text-dim">VERIFYING TOKENS...</p>
</div>
</main>
<style>
        @keyframes slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
<script>
        // Simulate a redirect after a short delay for demonstration purposes
        setTimeout(() => {
            // Normally this would redirect to the dashboard
            console.log("Session restored. Redirecting...");
            const loadingText = document.querySelector('p.font-mono-label');
            if(loadingText) {
                loadingText.innerText = "SESSION VERIFIED. REDIRECTING.";
                loadingText.classList.remove('text-dim');
                loadingText.classList.add('text-live');
            }
        }, 3000);
    </script>
