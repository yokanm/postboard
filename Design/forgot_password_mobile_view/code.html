<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Account Recovery | Industrial Broadsheet</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&amp;family=Playfair+Display:wght@700;900&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #080808;
            color: #B8B8B8;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for high-density feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #080808;
        }
        ::-webkit-scrollbar-thumb {
            background: #1A1A1A;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #E8610A;
        }
        /* Press Grid interaction */
        .press-grid-tile {
            transition: all 0.2s ease;
        }
        .press-grid-tile:hover {
            background-color: #ffb694;
            filter: contrast(1.2) brightness(1.1);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error": "#690005",
                      "dim": "#666666",
                      "gradient-a": "#C084FC",
                      "on-background": "#e5e2e1",
                      "on-tertiary-fixed": "#1c1b1b",
                      "on-secondary": "#31312c",
                      "surface-bright": "#3a3939",
                      "surface-dim": "#131313",
                      "outline-variant": "#594237",
                      "error-container": "#93000a",
                      "gradient-d": "#F59E0B",
                      "on-surface-variant": "#e1c0b2",
                      "background": "#131313",
                      "surface-variant": "#353534",
                      "primary": "#ffb694",
                      "outline": "#a88a7e",
                      "on-tertiary-container": "#2a2a29",
                      "on-primary": "#571f00",
                      "surface-container-high": "#2a2a2a",
                      "tertiary-fixed": "#e5e2e1",
                      "rule": "#1A1A1A",
                      "body": "#B8B8B8",
                      "on-primary-fixed-variant": "#7b2f00",
                      "primary-fixed": "#ffdbcc",
                      "surface-container-low": "#1c1b1b",
                      "secondary-container": "#474742",
                      "inverse-on-surface": "#313030",
                      "gradient-b": "#60A5FA",
                      "tertiary-container": "#929090",
                      "primary-fixed-dim": "#ffb694",
                      "tertiary": "#c8c6c5",
                      "on-tertiary": "#313030",
                      "on-tertiary-fixed-variant": "#474646",
                      "on-primary-container": "#4c1a00",
                      "secondary-fixed": "#e5e2db",
                      "on-secondary-container": "#b7b5af",
                      "on-primary-fixed": "#351000",
                      "on-error-container": "#ffdad6",
                      "live-dim": "#14532D",
                      "secondary": "#c9c6c0",
                      "muted": "#2A2A2A",
                      "live": "#22C55A",
                      "surface-container": "#201f1f",
                      "on-surface": "#e5e2e1",
                      "on-secondary-fixed": "#1c1c18",
                      "on-secondary-fixed-variant": "#474742",
                      "secondary-fixed-dim": "#c9c6c0",
                      "destructive": "#EF4444",
                      "inverse-surface": "#e5e2e1",
                      "tertiary-fixed-dim": "#c8c6c5",
                      "surface-container-highest": "#353534",
                      "surface": "#131313",
                      "primary-container": "#f06613",
                      "surface-tint": "#ffb694",
                      "inverse-primary": "#a14000",
                      "surface-container-lowest": "#0e0e0e",
                      "error": "#ffb4ab",
                      "gradient-c": "#34D399"
              },
              "borderRadius": {
                      "DEFAULT": "0px",
                      "lg": "0px",
                      "xl": "0px",
                      "full": "0px"
              },
              "spacing": {
                      "unit": "4px",
                      "gutter": "24px",
                      "sidebar-width": "220px",
                      "section-v-pad": "48px",
                      "max-width": "1280px",
                      "margin": "32px"
              },
              "fontFamily": {
                      "ui-xl": ["DM Sans"],
                      "masthead-4xl": ["Playfair Display"],
                      "headline-2xl": ["Playfair Display"],
                      "ui-lg": ["DM Sans"],
                      "ui-sm": ["DM Sans"],
                      "mono-label": ["JetBrains Mono"],
                      "headline-2xl-mobile": ["Playfair Display"],
                      "body-base": ["DM Sans"]
              },
              "fontSize": {
                      "ui-xl": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "masthead-4xl": ["96px", {"lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "900"}],
                      "headline-2xl": ["32px", {"lineHeight": "1.2", "fontWeight": "700"}],

                      "ui-sm": ["13px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "mono-label": ["11px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "400"}],

                      "body-base": ["15px", {"lineHeight": "1.6", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface-container-lowest selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation Anchor (Shared Component: TopAppBar) -->
<header class="fixed top-0 w-full z-50 border-b border-rule bg-background flex justify-between items-center h-16 px-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer active:opacity-80 transition-opacity" data-icon="arrow_back">arrow_back</span>
<div class="font-masthead-4xl text-headline-2xl-mobile text-primary tracking-tight">CANDIDATE_EDITOR</div>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors cursor-pointer" data-icon="save">save</span>
</div>
</header>
<!-- Main Container -->
<main class="min-h-screen pt-16 flex flex-col items-center justify-center px-4">
<!-- Decoration: Press Grid (Atmospheric Component) -->
<div class="w-full max-w-md mb-8 grid grid-cols-8 gap-1 opacity-20">
<script>
                for(let i=0; i<16; i++) {
                    document.write(`<div class="aspect-square bg-rule border border-white/5 press-grid-tile"></div>`);
                }
            </script>
</div>
<!-- Auth Card -->
<div class="w-full max-w-md border border-rule bg-surface p-8 md:p-12 relative overflow-hidden">
<!-- Technical Wayfinding Label -->
<div class="font-mono-label text-mono-label text-primary uppercase mb-6 flex items-center gap-2">
<span class="text-dim">//</span> account_recovery
            </div>
<!-- Heading Section -->
<h1 class="font-headline-2xl text-headline-2xl text-on-surface mb-3">Reset your password</h1>
<p class="font-body-base text-body-base text-dim mb-10 leading-relaxed">
                Enter the email address associated with your account and we'll send you a secure link to reset your password.
            </p>
<!-- Recovery Form -->
<form action="#" class="space-y-8" method="POST" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="font-mono-label text-mono-label text-on-surface-variant uppercase tracking-widest" for="email">
                        // work_email_address
                    </label>
<input class="w-full bg-surface-container-lowest border border-rule text-on-surface font-body-base px-4 py-3 outline-none focus:border-primary transition-all rounded-none placeholder:text-muted" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="pt-4">
<button class="w-full bg-primary-container text-on-primary-container font-ui-lg text-ui-lg py-4 border border-primary transition-all active:scale-[0.98] hover:bg-primary-container/90 rounded-none uppercase tracking-tight" type="submit">
                        Send Reset Link
                    </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-12 pt-8 border-t border-rule flex justify-center">
<a class="flex items-center gap-2 font-mono-label text-mono-label text-dim hover:text-primary transition-colors group" href="/login">
<span class="material-symbols-outlined text-[16px] transition-transform group-hover:-translate-x-1" data-icon="arrow_left_alt">arrow_left_alt</span>
                    Back to login
                </a>
</div>
<!-- Decorative Technical Detail -->
<div class="absolute bottom-2 right-4 font-mono-label text-[8px] text-muted opacity-30 select-none">
                SYS_RECOVERY_V4.02 // PIPELINE_SECURE
            </div>
</div>
<!-- Decorative Floating Gradient (Iridescent Data) -->
<div class="fixed -bottom-24 -left-24 w-96 h-96 opacity-10 pointer-events-none">

</div>
</main>
<!-- Bottom Separation Logic (As per Design System's minimal depth) -->
<footer class="mt-auto py-8 text-center">
<div class="font-mono-label text-[10px] text-muted uppercase tracking-[0.2em]">
            © 2024 Industrial Broadsheet Systems
        </div>
</footer>
<script>
        // Micro-interaction: Input focus effect
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.replace('text-primary', 'text-on-surface-variant');
            });
        });
    </script>
</body></html>
