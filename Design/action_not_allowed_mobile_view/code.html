<script>
        // Update timestamp for technical feel
        const timeElement = document.getElementById('current-time');
        if (timeElement) {
            setInterval(() => {
                const now = new Date();
                timeElement.textContent = now.toISOString().replace('T', ' ').substring(0, 19) + 'Z';
            }, 1000);
            timeElement.textContent = new Date().toISOString().replace('T', ' ').substring(0, 19) + 'Z';
