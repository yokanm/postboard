<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 border-b border-rule flex justify-between items-center h-16 px-4 bg-background">
<div class="font-masthead-4xl text-headline-2xl-mobile text-primary">CANDIDATE_EDITOR</div>
<button class="text-primary active:opacity-80 transition-opacity">
<span class="material-symbols-outlined">save</span>
</button>
</header>
<!-- Content Canvas -->
<main class="flex-1 mt-16 px-4 py-12 max-w-md mx-auto w-full">
<!-- Label & Headline -->
<div class="mb-12">
<p class="font-mono-label text-mono-label uppercase text-primary mb-2">// NEW_PASSWORD</p>
<h1 class="font-headline-2xl-mobile text-headline-2xl-mobile text-on-surface">Choose a new password</h1>
<p class="font-ui-sm text-ui-sm text-dim mt-2">Ensure your account remains secure with a complex technical credential.</p>
</div>
<!-- Form Area -->
<form class="space-y-8" onsubmit="return false;">
<!-- Password Field 1 -->
<div class="space-y-2">
<label class="font-mono-label text-mono-label text-dim uppercase">// INPUT_FIELD_01</label>
<div class="relative group">
<input class="w-full bg-surface-container-lowest border border-rule px-4 py-4 text-on-surface font-mono-label focus:border-primary transition-colors duration-200" id="pwd-1" oninput="updateStrength(this.value)" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-dim hover:text-on-surface" onclick="toggleVisibility('pwd-1')" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
<!-- Strength Meter -->
<div class="flex gap-1 pt-2" id="strength-meter">
<div class="strength-segment h-1 flex-1 bg-muted"></div>
<div class="strength-segment h-1 flex-1 bg-muted"></div>
<div class="strength-segment h-1 flex-1 bg-muted"></div>
<div class="strength-segment h-1 flex-1 bg-muted"></div>
</div>
<p class="font-mono-label text-[10px] text-dim uppercase mt-1" id="strength-text">Complexity: Null</p>
</div>
<!-- Password Field 2 -->
<div class="space-y-2">
<label class="font-mono-label text-mono-label text-dim uppercase">// VERIFY_FIELD_02</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-rule px-4 py-4 text-on-surface font-mono-label focus:border-primary transition-colors duration-200" id="pwd-2" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-dim hover:text-on-surface" onclick="toggleVisibility('pwd-2')" type="button">
<span class="material-symbols-outlined text-[18px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-4 font-ui-lg text-ui-lg hover:brightness-110 active:scale-[0.98] transition-all">
                    Set New Password
                </button>
<a class="block text-center mt-6 text-dim hover:text-primary font-mono-label text-mono-label uppercase tracking-widest transition-colors" href="#">
                    Back to login
                </a>
</div>
</form>
<!-- Decorative Press Grid (Minimalist version for mobile context) -->
<div class="mt-16 border-t border-rule pt-8">
<div class="grid grid-cols-8 gap-1 opacity-20">
<script>
                    for(let i=0; i<16; i++) {
                        document.write('<div class="aspect-square bg-muted"></div>');
                    }
                </script>
</div>
<p class="font-mono-label text-[9px] text-dim mt-4">TERMINAL_REF: PW_RESET_SEQ_0091</p>
</div>
</main>
<!-- Bottom Navigation Suppressed as per "Transactional" rule -->
<script>
        function toggleVisibility(id) {
            const el = document.getElementById(id);
            const icon = el.nextElementSibling.querySelector('.material-symbols-outlined');
            if (el.type === "password") {
                el.type = "text";
                icon.innerText = "visibility_off";
            } else {
                el.type = "password";
                icon.innerText = "visibility";
            }
        }

        function updateStrength(val) {
            const segments = document.querySelectorAll('.strength-segment');
            const text = document.getElementById('strength-text');
            
            // Clear all
            segments.forEach(s => s.className = 'strength-segment h-1 flex-1 bg-muted');
            
            if (val.length === 0) {
                text.innerText = "Complexity: Null";
                return;
            }

            let score = 0;
            if (val.length > 6) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const colors = [
                'bg-destructive', // Weak
                'bg-gradient-d',  // Fair
                'bg-gradient-b',  // Good
                'bg-live'        // Strong
            ];

            const labels = ["WEAK", "FAIR", "GOOD", "STRONG"];

            for (let i = 0; i < score; i++) {
                segments[i].classList.remove('bg-muted');
                segments[i].classList.add(colors[score - 1]);
            }
            
            text.innerText = "Complexity: " + labels[score - 1];
            text.className = `font-mono-label text-[10px] uppercase mt-1 text-${colors[score-1].replace('bg-', '')}`;
        }
    </script>
</body></html>
