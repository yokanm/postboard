# ─── Postboard — Main Server Block (HTTPS) ────────────────────────────────────
# Reverse proxy configuration for frontend (SSR) and API.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ─── SSL Certificates (LetsEncrypt / Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://sentry.io;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: blob: https://res.cloudinary.com https://*.sentry.io;
        font-src 'self' data:;
        connect-src 'self' https://sentry.io;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/postboard-access.log main buffer=32k flush=5s;
    error_log  /var/log/nginx/postboard-error.log warn;

    # ─── Frontend (SSR) — Root ───────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Caching — SSR content is dynamic
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # ─── Static Assets (long-lived cache) ────────────────────────────────────
    location /assets/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache for 1 year — assets have content hashes in filenames
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        access_log off;
    }

    location /robots.txt {
        proxy_pass http://frontend;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /og-image.png {
        proxy_pass http://frontend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    # ─── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=200 nodelay;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # No caching for API responses
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Request-Id' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }
    }

    # ─── Auth endpoints (stricter rate limiting) ──────────────────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 15s;
    }

    # ─── Health Checks ───────────────────────────────────────────────────────
    location /health {
        access_log off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        proxy_pass http://api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ready {
        access_log off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        proxy_pass http://api/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─── Deny access to sensitive paths ───────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(node_modules|prisma|src|generated) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /admin/queues {
        # Bull Board — proxied to API which handles auth
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
